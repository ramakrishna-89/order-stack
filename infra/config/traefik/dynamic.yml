http:

  # ── Routers ───────────────────────────────────────────────────────────────────

  routers:

    # Dashboard — lowest priority (catches everything not matched above)
    dashboard:
      entryPoints: [web]
      rule: "PathPrefix(`/`)"
      middlewares: [dashboard-auth]
      service: dashboard-svc
      priority: 1

    # Order REST API — rate limited, no auth (used by load tests and CI)
    order-api:
      entryPoints: [web]
      rule: "PathPrefix(`/orders`) || PathPrefix(`/actuator`)"
      middlewares: [order-ratelimit]
      service: order-svc
      priority: 100

    # Grafana — has its own login, no additional BasicAuth
    grafana:
      entryPoints: [web]
      rule: "PathPrefix(`/grafana`)"
      service: grafana-svc
      priority: 100

    # Kafka UI — BasicAuth at proxy level
    kafka-ui:
      entryPoints: [web]
      rule: "PathPrefix(`/kafka-ui`)"
      middlewares: [dashboard-auth]
      service: kafka-ui-svc
      priority: 100

    # pgAdmin — BasicAuth at proxy level
    pgadmin:
      entryPoints: [web]
      rule: "PathPrefix(`/pgadmin`)"
      middlewares: [dashboard-auth]
      service: pgadmin-svc
      priority: 100

    # Prometheus — BasicAuth at proxy level
    # No strip-prefix: Prometheus serves under /prometheus via --web.route-prefix
    prometheus:
      entryPoints: [web]
      rule: "PathPrefix(`/prometheus`)"
      middlewares: [dashboard-auth]
      service: prometheus-svc
      priority: 100

    # Redis Insight — BasicAuth at proxy level
    # RI_PROXY_PATH=/redis makes it serve all assets under /redis — no prefix stripping needed
    redis-insight:
      entryPoints: [web]
      rule: "PathPrefix(`/redis`)"
      middlewares: [dashboard-auth]
      service: redis-svc
      priority: 100

  # ── Middlewares ───────────────────────────────────────────────────────────────

  middlewares:

    # Shared BasicAuth — admin / admin@12
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$2y$05$cYrFgnLadTntXe83KFFIBuHJJS711crBE7D.5NxzkZufbgqr..X.u"

    order-ratelimit:
      rateLimit:
        average: 100
        burst: 50

  # ── Services ──────────────────────────────────────────────────────────────────

  services:

    dashboard-svc:
      loadBalancer:
        servers:
          - url: "http://stack-dashboard:80"

    order-svc:
      loadBalancer:
        servers:
          - url: "http://stack-order-service:8080"

    grafana-svc:
      loadBalancer:
        servers:
          - url: "http://stack-grafana:3000"

    kafka-ui-svc:
      loadBalancer:
        servers:
          - url: "http://stack-kafka-ui:8080"

    pgadmin-svc:
      loadBalancer:
        servers:
          - url: "http://stack-pgadmin:80"

    prometheus-svc:
      loadBalancer:
        servers:
          - url: "http://stack-prometheus:9090"

    redis-svc:
      loadBalancer:
        servers:
          - url: "http://stack-redis-insight:5540"
