server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/prometheus/api/v1/write
        send_exemplars: true

# Ingestion cap: 5MB max per trace, metrics processors enabled
# Block retention set via CLI flag: -backend-worker.compaction.block-retention=1h
overrides:
  max_bytes_per_trace: 5000000
  metrics_generator_processors: [service-graphs, span-metrics]
