name: ecom-stack

networks:
  ecom-net:
    driver: bridge

# ── Postgres ───────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - type: bind
        source: ./containers/postgres/data
        target: /var/lib/postgresql/data
      - type: bind
        source: ./config/postgres/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - wal_buffers=64MB
      - -c
      - synchronous_commit=off
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_connections=200
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ecom-net]

  # ── pgAdmin (Postgres UI) ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecom-pgadmin
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    volumes:
      - type: bind
        source: ./config/pgadmin/servers.json
        target: /pgadmin4/servers.json
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ecom-net]

# ── Kafka (KRaft — no Zookeeper) ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ecom-kafka
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Throughput tuning
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_COMPRESSION_TYPE: lz4
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [ecom-net]

  # ── Kafka topic init ────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ecom-kafka-init
    labels: { ecom: "true" }
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order-events     --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order-events.DLT --partitions 1 --replication-factor 1
        echo "Topics ready:"
        kafka-topics --bootstrap-server kafka:29092 --list
    networks: [ecom-net]
    restart: "no"

  # ── Kafka UI ────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      KAFKA_CLUSTERS_0_NAME:             ecom-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [ecom-net]

  # ── Kafka Exporter ────────────────────────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: ecom-kafka-exporter
    restart: unless-stopped
    labels: { ecom: "true" }
    command: ["--kafka.server=kafka:29092"]
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [ecom-net]

# ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    labels: { ecom: "true" }
    command: >
      redis-server
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --tcp-backlog 511
      --save ""
      --appendonly no
    ports:
      - "6380:6379"
    volumes:
      - type: bind
        source: ./containers/redis/data
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ecom-net]

  # ── Redis Insight (Redis UI) ────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: ecom-redis-insight
    restart: unless-stopped
    labels: { ecom: "true" }
    ports:
      - "5541:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks: [ecom-net]

# ── Observability stack ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: ecom-prometheus
    restart: unless-stopped
    labels: { ecom: "true" }
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    ports:
      - "9090:9090"
    volumes:
      - type: bind
        source: ./config/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - type: bind
        source: ./containers/prometheus/data
        target: /prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [ecom-net]

  loki:
    image: grafana/loki:latest
    container_name: ecom-loki
    restart: unless-stopped
    labels: { ecom: "true" }
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - type: bind
        source: ./config/loki/loki-config.yml
        target: /etc/loki/loki-config.yml
        read_only: true
    networks: [ecom-net]

  promtail:
    image: grafana/promtail:latest
    container_name: ecom-promtail
    restart: unless-stopped
    labels: { ecom: "true" }
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - type: bind
        source: ./config/promtail/promtail-config.yml
        target: /etc/promtail/promtail-config.yml
        read_only: true
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [ecom-net]

  tempo:
    image: grafana/tempo:latest
    container_name: ecom-tempo
    restart: unless-stopped
    labels: { ecom: "true" }
    command: >
      -config.file=/etc/tempo/tempo-config.yml
      -config.enable-legacy-overrides
      -backend-worker.compaction.block-retention=1h
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - type: bind
        source: ./config/tempo/tempo-config.yml
        target: /etc/tempo/tempo-config.yml
        read_only: true
      - type: bind
        source: ./containers/tempo/data
        target: /tmp/tempo
    networks: [ecom-net]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ecom-otel-collector
    restart: unless-stopped
    labels: { ecom: "true" }
    command: --config=/etc/otel/otel-config.yml
    ports:
      - "4319:4317"
      - "4320:4318"
    volumes:
      - type: bind
        source: ./config/otel-collector/otel-config.yml
        target: /etc/otel/otel-config.yml
        read_only: true
    depends_on: [tempo]
    networks: [ecom-net]

# ── Notification Service ───────────────────────────────────────────────────────
  notification-service:
    image: ramakrishnastitch/ecom-notification-service:latest
    # build: { context: ../../code/notification-service, dockerfile: Dockerfile }
    container_name: ecom-notification-service
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    command: ["sh", "-c", "sleep 5 && java -jar /app/app.jar"]
    networks: [ecom-net]

# ── Order Service ──────────────────────────────────────────────────────────────
  order-service:
    image: ramakrishnastitch/ecom-order-service:latest
    # build: { context: ../../code/order-service, dockerfile: Dockerfile }
    container_name: ecom-order-service
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecom
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OUTBOX_POLLER_BATCH_SIZE: 500
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on: [postgres, redis, kafka, otel-collector]
    networks: [ecom-net]

# ── Dashboard (Angular + nginx) ────────────────────────────────────────────────
  dashboard:
    image: ramakrishnastitch/ecom-dashboard:latest
    # build: { context: ../../code/dashboard, dockerfile: Dockerfile }
    container_name: ecom-dashboard
    restart: unless-stopped
    labels: { ecom: "true" }
    ports:
      - "4200:80"
    depends_on: [notification-service]
    networks: [ecom-net]

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ecom-grafana
    restart: unless-stopped
    labels: { ecom: "true" }
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_FEATURE_TOGGLES_ENABLE:  traceqlEditor
    ports:
      - "3010:3000"
    volumes:
      - type: bind
        source: ./config/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
      - type: bind
        source: ./containers/grafana/data
        target: /var/lib/grafana
    depends_on: [prometheus, loki, tempo]
    networks: [ecom-net]
