server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS — resolves names at request time, not startup time.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Redirect bare root to /dashboard/ (direct access via localhost:4200)
    location = / {
        return 301 /dashboard/;
    }

    # Angular SPA — strip /dashboard prefix before looking up files on disk
    # Built with --base-href /dashboard/ so all asset hrefs resolve correctly
    location / {
        rewrite ^/dashboard/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Proxy SSE stream to notification-service
    location /notifications/ {
        set $upstream http://notification-service:8081;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
