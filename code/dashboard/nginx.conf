server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS — resolves names at request time, not startup time.
    # Without this, nginx crashes if notification-service isn't up when nginx starts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Angular SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy SSE stream to notification-service
    location /notifications/ {
        set $upstream http://notification-service:8081;
        proxy_pass         $upstream;  # variable proxy_pass passes full URI unchanged — no path rewriting needed
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
